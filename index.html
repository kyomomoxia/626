<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX智能影音 - 专属私人接口配置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a12;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 59, 48, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(50, 100, 255, 0.15) 0px, transparent 50%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo { font-size: 42px; margin-bottom: 12px; }
        h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; background: linear-gradient(90deg, #fff, #a5a5b5); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .subtitle { color: #8e8e9f; font-size: 14px; margin-bottom: 32px; }
        
        .url-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            gap: 10px;
        }
        .url-text {
            font-family: "SFMono-Regular", Consolas, monospace;
            color: #4cd964;
            font-size: 14px;
            padding-left: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: all;
        }
        .btn-copy {
            background: linear-gradient(135deg, #ff3b30, #ff9500);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .btn-copy:active { transform: scale(0.96); }
        .btn-copy.success { background: #34c759; }

        .steps { text-align: left; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; font-size: 13px; line-height: 1.8; color: #b0b0c0;}
        .steps b { color: #fff; }
        @media (max-width: 480px) {
            .url-card { flex-direction: column; padding: 12px; }
            .url-text { padding: 8px 0; width: 100%; text-align: center; }
            .btn-copy { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🎬</div>
    <h1>MAX 智能影音专属配置</h1>
    <p class="subtitle">全网4K极速源 · 云端全自动智能分发</p>

    <div class="url-card">
        <span class="url-text" id="dynamicUrl">加载中...</span>
        <button class="btn-copy" id="copyBtn" onclick="doCopy()">一键复制接口</button>
    </div>

    <div class="steps">
        <b>💡 配置指南：</b><br>
        1. 点击上方按钮，复制您的<b>专属配置链接</b>。<br>
        2. 打开电视端（影视仓 / TVBox / 肥猫等）。<br>
        3. 进入 <b>设置 -> 配置地址</b>，粘贴并确定即可。
    </div>
</div>

<script>
    // 【核心黑科技：自动识别用户当前访问的网址】
    window.onload = function() {
        let currentFullUrl = window.location.href;
        
        // 如果用户直接访问的是根域名 https://kyomomo.top （没带任何json后缀）
        if (!currentFullUrl.toLowerCase().includes('.json')) {
            let cleanHost = currentFullUrl.replace(/\/$/, ""); // 去掉末尾斜杠
            currentFullUrl = cleanHost + "/index.json"; // 默认展示主入口
        }
        
        document.getElementById('dynamicUrl').innerText = currentFullUrl;
    };

    function doCopy() {
        const text = document.getElementById('dynamicUrl').innerText;
        const btn = document.getElementById('copyBtn');
        
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = "✅ 已复制到剪贴板";
            btn.classList.add("success");
            setTimeout(() => {
                btn.innerText = "一键复制接口";
                btn.classList.remove("success");
            }, 2500);
        });
    }
</script>
</body>
</html>
